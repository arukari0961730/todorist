<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>ゲーム開発サークル向け作業管理アプリ</title>
  <link rel="stylesheet" href="todorist.css">
  <script src="todorist.js" defer></script>
</head>

<body>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h2>課題詳細</h2>
      <div id="modalContent"></div>
    </div>
  </div>

  <header class="app-header">
    <h1>ゲーム開発サークル向け作業管理アプリ</h1>
  </header>

  <div class="app-layout">

    <aside class="sidebar">
      <h2>チーム</h2>

      <button class="team-btn active">個人ゲーム制作チーム</button>
      <button class="team-btn">マルチゲーム制作チーム</button>
      <button class="team-btn">ガッツリゲーム制作チーム</button>

      <hr>

      <nav class="side-menu">
        <button class="menu-btn active">タスク</button>
        <button class="menu-btn">カレンダー</button>
        <button class="menu-btn">チャット</button>
        <button class="menu-btn">PR共有</button>
        <button class="menu-btn">メンバー</button>
      </nav>
    </aside>

    <main class="main-content">

      <section class="form-section">
        <h2>課題を追加</h2>

        <label>課題名</label>
        <input type="text" id="titleInput">

        <label>詳細</label>
        <textarea id="descriptionInput"></textarea>

        <label>担当者</label>
        <input type="text" id="assigneeInput">

        <label>開始日</label>
        <input type="date" id="startDateInput">

        <label>締切日</label>
        <input type="date" id="deadlineInput">

        <label>状態</label>
        <select id="statusInput">
          <option value="todo">未着手</option>
          <option value="working">作業中</option>
          <option value="review">確認待ち</option>
          <option value="fix">修正中</option>
          <option value="done">完了</option>
        </select>

        <button id="addBtn">追加</button>

        <p id="errorMessage"></p>
      </section>

      <section class="calendar-section">
        <div class="section-header">
          <h2>作業管理</h2>

          <div class="view-tabs">
            <button id="calendarTab" class="tab-btn active">カレンダー</button>
            <button id="listTab" class="tab-btn">一覧</button>
            <button id="ganttTab" class="tab-btn">ガント</button>
            <button id="boardTab" class="tab-btn">ボード</button>
          </div>
        </div>

        <div class="search-area">
          <input type="text" id="searchInput" placeholder="課題名・詳細・担当者・状態で検索">
        </div>

        <div class="filter-area">
          <select id="statusFilter">
            <option value="all">すべての状態</option>
            <option value="todo">未着手</option>
            <option value="working">作業中</option>
            <option value="review">確認待ち</option>
            <option value="fix">修正中</option>
            <option value="done">完了</option>
          </select>

          <select id="deadlineFilter">
            <option value="all">すべての期限</option>
            <option value="expired">期限切れのみ</option>
            <option value="today">今日締切のみ</option>
          </select>
        </div>

        <div id="calendarArea" class="view-content">
          <div class="calendar-header">
            <button id="prevBtn">←</button>
            <button id="todayBtn">今日</button>
            <h3 id="monthTitle"></h3>
            <button id="nextBtn">→</button>
          </div>

          <div id="calendarTableArea"></div>
        </div>

        <div id="listArea" class="view-content hidden">
          <h3>タスク一覧</h3>
          <div id="taskListArea"></div>
        </div>

        <div id="ganttArea" class="view-content hidden">
          <h3>ガントチャート</h3>
          <div id="ganttChartArea"></div>
        </div>

        <div id="boardArea" class="view-content hidden">
          <h3>ボード表示</h3>
          <div id="boardContentArea"></div>
        </div>
      </section>

    </main>

  </div>

</body>

</html>
