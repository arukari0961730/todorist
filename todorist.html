<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>グループ課題管理アプリ</title>
  <link rel="stylesheet" href="todorist.css">
  <script src="todorist.js" defer></script>
</head>
<body>
  <h1>グループ課題管理アプリ</h1>

  <section class="form-section">
    <h2>課題を追加</h2>

    <label>課題名</label>
    <input type="text" id="titleInput">

    <label>詳細</label>
    <textarea id="descriptionInput"></textarea>

    <label>締切日</label>
    <input type="date" id="deadlineInput">

    <button id="addBtn">追加</button>

    <p id="errorMessage"></p>
  </section>

  <section class="calendar-section">
    <h2>締切カレンダー</h2>

    <div class="calendar-layout">
      <div id="calendarArea">
        <div class="calendar-header">
          <button id="prevBtn">←</button>
          <h3 id="monthTitle"></h3>
          <button id="nextBtn">→</button>
        </div>

        <div id="calendarTableArea"></div>
      </div>

      <div id="taskDetail" class="task-detail">
        <p>課題を選択してください</p>
      </div>
    </div>
  </section>
</body>
</html>
