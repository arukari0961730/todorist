<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>グループ課題管理アプリ</title>
  <script src="todorist.js" defer></script>
</head>
<body>
  <h1>グループ課題管理アプリ</h1>

  <section>
    <h2>課題を追加</h2>

    <label for="titleInput">課題名</label>
    <input type="text" id="titleInput">

    <label for="descriptionInput">詳細</label>
    <textarea id="descriptionInput"></textarea>

    <label for="deadlineInput">締切日</label>
    <input type="date" id="deadlineInput">

    <button id="addBtn">追加</button>

    <p id="errorMessage"></p>
  </section>

  <section>
    <h2>課題一覧</h2>
    <ul id="taskList"></ul>
  </section>

</body>
</html>
